version: '3.8'

services:
  rag-engine:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./app:/app/app
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ENVIRONMENT=development
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
